<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <title>Dynamic Labor Calculator</title> 
    <style> 
        body { font-family: sans-serif; margin: 20px; } 
        .calculator { max-width: 450px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; } 
        .row { display: flex; gap: 10px; margin-bottom: 10px; } 
        select, input { padding: 8px; box-sizing: border-box; } 
        button { padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px;} 
        .result { margin-top: 20px; font-size: 1.2em; font-weight: bold; } 
    </style> 
</head>

    <h2>Dynamic Labor Calculator</h2> 
    <div id="timecard-rows"> 
        <div class="row"> 
            <select class="employee-select" id="initial-select">
                <!-- Dropdown list populated by script -->
            </select> 
            <input type="number" class="hours-input" placeholder="Hours Worked"> 
        </div> 
    </div> 
    <button onclick="addRow()">+ Add Employee Row</button> 
    <br><br> 
    <label for="revenue">Total Revenue ($):</label> 
    <input type="number" id="revenue" placeholder="e.g. 5000" style="width: 100%;"> 
    <button onclick="calculateTotalLabor()" style="background: #007BFF; width: 100%;">Calculate Labor %</button>

</div>

// MODIFIED: This loop now generates raw names without appending the wage strings
let optionsHtml = '';
for (const name in employeeRoster) {
    optionsHtml += '<option value="' + name + '">' + name + '</option>';
}

document.getElementById('initial-select').innerHTML = optionsHtml;

function addRow() { 
    const container = document.getElementById('timecard-rows'); 
    const newRow = document.createElement('div'); 
    newRow.className = 'row'; 
    
    newRow.innerHTML = ` 
        <select class="employee-select"> 
            ${optionsHtml} 
        </select> 
        <input type="number" class="hours-input" placeholder="Hours Worked"> 
    `; 
    container.appendChild(newRow); 
} 

function calculateTotalLabor() { 
    const selects = document.querySelectorAll('.employee-select'); 
    const inputs = document.querySelectorAll('.hours-input'); 
    const revenue = parseFloat(document.getElementById('revenue').value); 
    
    let totalLaborCost = 0; 
    
    selects.forEach((select, index) => { 
        const employeeName = select.value; 
        const hours = parseFloat(inputs[index].value) || 0; 
        const wage = employeeRoster[employeeName] || 0; 
        totalLaborCost += (wage * hours); 
    }); 
    
    if (revenue > 0) { 
        const percentage = (totalLaborCost / revenue) * 100; 
        // MODIFIED OPTION: Hides the total dollar sum if you want absolute cost privacy
        document.getElementById('output').innerHTML = `Labor Percentage: ${percentage.toFixed(2)}%`; 
    } else { 
        document.getElementById('output').innerHTML = "Please enter a valid revenue number."; 
    } 
}
